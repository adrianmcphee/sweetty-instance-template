# OPTIONAL HAProxy edge for SweeTTY.
#
# This layer is not required. The default topology has sweetty bind the public
# ports directly. Use HAProxy only when you want a clean TCP edge: real-source-IP
# preservation and true zero-downtime blue/green (HAProxy routes to the healthy
# backend instead of a brief stop/start cutover). It does not front the portal,
# which binds loopback and is reached over the management SSH tunnel.
#
# Two things in here are non-negotiable for a honeypot. Read haproxy/README.md
# before changing either.
#   1. send-proxy: the PROXY protocol header carries the real attacker source IP
#      to sweetty, so the log still records who connected. sweetty MUST have
#      "proxy_protocol": true in its config and be bound to the loopback backend
#      ports below (see config.haproxy.json).
#   2. The stick-table limits are GENTLE on purpose. They shed only obvious
#      floods that would drown the sensor. They never gate normal attacker
#      access, because letting attackers in is the entire point.

global
    log /dev/log local0
    maxconn 20000
    user haproxy
    group haproxy
    daemon
    # Runtime socket. The sweetty hapwatch helper reads the stick-table here to log
    # FLOOD_BLOCKED events into the event stream. "operator" level allows show
    # commands but not the dangerous admin ones; mode 660 means root and the
    # haproxy group can reach it (provision adds the sweetty user to that group).
    stats socket /run/haproxy/admin.sock mode 660 level operator
    stats timeout 30s

defaults
    log global
    mode tcp
    option dontlognull
    timeout connect 5s
    timeout client 1m
    timeout server 1m
    # Tarpit protocols hold connections open for minutes by design. Keep the
    # tunnel timeout generous so HAProxy does not cut the very engagement we want.
    timeout tunnel 1h

# Per-source counters. conn_cur = concurrent connections held; conn_rate = new
# connections in the window. Used only to reject obvious volumetric abuse.
backend st_src
    stick-table type ip size 1m expire 10m store conn_cur,conn_rate(10s)

# ---------------------------------------------------------------------------
# Honeypot ports. TCP passthrough with PROXY protocol to the sweetty backend.
# Public port  ->  loopback backend port (public + 10000, except 2323 -> 12323).
# ---------------------------------------------------------------------------

frontend fe_ftp
    bind :21
    tcp-request connection track-sc0 src table st_src
    tcp-request connection reject if { sc0_conn_rate(st_src) gt 200 }
    tcp-request connection reject if { sc0_conn_cur(st_src) gt 100 }
    default_backend be_ftp
backend be_ftp
    server sweetty 127.0.0.1:10021 send-proxy

frontend fe_ssh
    bind :22
    tcp-request connection track-sc0 src table st_src
    tcp-request connection reject if { sc0_conn_rate(st_src) gt 200 }
    tcp-request connection reject if { sc0_conn_cur(st_src) gt 100 }
    default_backend be_ssh
backend be_ssh
    server sweetty 127.0.0.1:10022 send-proxy

frontend fe_telnet
    bind :23
    tcp-request connection track-sc0 src table st_src
    tcp-request connection reject if { sc0_conn_rate(st_src) gt 200 }
    tcp-request connection reject if { sc0_conn_cur(st_src) gt 100 }
    default_backend be_telnet
backend be_telnet
    server sweetty 127.0.0.1:10023 send-proxy

frontend fe_http
    bind :80
    tcp-request connection track-sc0 src table st_src
    tcp-request connection reject if { sc0_conn_rate(st_src) gt 400 }
    tcp-request connection reject if { sc0_conn_cur(st_src) gt 200 }
    default_backend be_http
backend be_http
    server sweetty 127.0.0.1:10080 send-proxy

frontend fe_https
    bind :443
    tcp-request connection track-sc0 src table st_src
    tcp-request connection reject if { sc0_conn_rate(st_src) gt 400 }
    tcp-request connection reject if { sc0_conn_cur(st_src) gt 200 }
    default_backend be_https
backend be_https
    server sweetty 127.0.0.1:10443 send-proxy

frontend fe_telnet_alt
    bind :2323
    tcp-request connection track-sc0 src table st_src
    tcp-request connection reject if { sc0_conn_rate(st_src) gt 200 }
    tcp-request connection reject if { sc0_conn_cur(st_src) gt 100 }
    default_backend be_telnet_alt
backend be_telnet_alt
    server sweetty 127.0.0.1:12323 send-proxy

frontend fe_http_alt
    bind :8080
    tcp-request connection track-sc0 src table st_src
    tcp-request connection reject if { sc0_conn_rate(st_src) gt 400 }
    tcp-request connection reject if { sc0_conn_cur(st_src) gt 200 }
    default_backend be_http_alt
backend be_http_alt
    server sweetty 127.0.0.1:18080 send-proxy

# ---------------------------------------------------------------------------
# The portal is NOT fronted here. It binds loopback and is reached only by
# forwarding the management SSH port to it (ssh -L ...:127.0.0.1:<portal_port>),
# so SSH key auth is the single front door. HAProxy's job is the honeypot edge
# above: PROXY protocol to preserve the source IP, and gentle flood limits.
#
# Stats console. Bound to loopback ONLY, never exposed publicly. The sweetty
# portal reverse-proxies it at /dashboard/console/haproxy/, so an operator opens
# it from the dashboard over the same SSH tunnel that reaches the portal. There
# is no second password and no second public port to manage.
#
# stats uri is the portal mount path, not "/": the stats page emits absolute
# links rooted at this uri, so matching it to the external mount keeps sorting,
# refresh, and admin links working through the proxy. The portal's "haproxy"
# console therefore forwards the full path (the default; do NOT set strip_prefix).
#
# The only client that can reach this bind is the local portal proxy (127.0.0.1),
# which is already authenticated, so admin actions (enable or disable a backend)
# are permitted from loopback. Nothing off-host can reach it.
# ---------------------------------------------------------------------------
listen stats
    bind 127.0.0.1:19000
    mode http
    stats enable
    stats uri /dashboard/console/haproxy
    stats refresh 10s
    stats show-node
    stats show-legends
    stats admin if { src 127.0.0.0/8 }
