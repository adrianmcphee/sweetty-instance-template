#cloud-config
#
# SweeTTY honeypot first-boot provisioning.
#
# Paste this into your cloud provider's user-data field (or reference it from
# Terraform, see ../terraform). Edit the values under write_files first: the
# instance env is the single source of truth and the git URL points at the repo
# that holds provision.sh.
#
# This runs once, as root, before anyone logs in, which is the safe place to
# move SSH off port 22. By the time the box answers on the admin port, the
# firewall is already up and the honeypot ports are the only thing open to all.

package_update: true
package_upgrade: true

packages:
  - git
  - curl
  - ca-certificates

write_files:
  # The instance configuration. Fill these in. Treat OPERATOR_IP as the only
  # address that should ever reach management; everything else is the trap.
  - path: /root/sweetty.instance.env
    permissions: "0600"
    content: |
      # Provisioning code pin. cloud-init fetches provision.sh and the whole
      # firewall/systemd/IDS perimeter from this repo at this exact commit and
      # verifies it before running it as root, so a poisoned fetch cannot define your
      # perimeter. PROVISION_REF is a ref NAME and defaults to an immutable release
      # tag: a tag names one reviewed commit that never moves, so the pin is stable.
      # A moving branch like main drifts, its tip advancing under the pin, so
      # re-provisioning would power the box off until you re-review and bump
      # PROVISION_SHA. PROVISION_SHA is the commit the ref must resolve to, from
      # `git rev-parse <ref>^{commit}` (the ^{commit} matters for annotated tags). On
      # any mismatch the box powers itself off instead of provisioning from an unknown
      # tree.
      PROVISION_REPO="https://github.com/adrianmcphee/sweetty-instance-template.git"
      PROVISION_REF="v0.2.0"
      PROVISION_SHA="REPLACE_WITH_REVIEWED_COMMIT_SHA"
      SWEETTY_REPO="adrianmcphee/sweetty"
      RELEASE_TAG="v0.1.10"
      SWEETTY_USER="sweetty"
      INSTALL_DIR="/opt/sweetty"
      DEPLOY_USER="deploy"
      # REPLACE 203.0.113.10 with the public IP you connect from. Admin SSH is
      # firewalled to it alone, so a stale value locks you out (rebuild required); an
      # all-internet wildcard is rejected by the renderer. ADMIN_SSH_PORT is left
      # empty so each instance randomizes its real-SSH port (no fleet-wide tell);
      # provisioning writes the chosen port and the exact login + tunnel commands to
      # /root/sweetty-access.txt, which you read from the provider's serial console.
      # Pin a value here instead only if you would rather fix the port before boot.
      OPERATOR_IP="203.0.113.10"
      ADMIN_SSH_PORT=""
      PORTAL_PORT="8888"
      DNS_RESOLVERS="1.1.1.1,9.9.9.9"
      LOG_ENDPOINT="logs.example.com:6514"
      LOG_TRANSPORT="tls"
      SWEETTY_PROFILE="random"
      TOPOLOGY="haproxy"

  # The deploy public key the CI deploy uses. Replace with your own.
  - path: /root/deploy.pub
    permissions: "0644"
    content: |
      ssh-ed25519 AAAA_REPLACE_WITH_YOUR_DEPLOY_PUBLIC_KEY deploy@ci

runcmd:
  # Fetch the provisioning code at the pinned commit, verify it, provision, and
  # install the deploy key, all in ONE shell with `set -e`. cloud-init does NOT stop
  # between runcmd entries, so everything that must not run against an unverified
  # tree lives here: the early `exit 1` on a pin mismatch (set -e) guarantees neither
  # provisioning nor the key install runs, and the mismatch also force-powers-off so
  # a verification-failed box does not linger. For a private fork, point
  # PROVISION_REPO at it and deliver a read-only deploy key out of band.
  - |
    bash -c '
    set -euo pipefail
    . /root/sweetty.instance.env
    : "${PROVISION_SHA:?set PROVISION_SHA in the instance env to the reviewed commit}"
    rm -rf /opt/sweetty-instance-template
    git clone --depth 1 --branch "${PROVISION_REF:-v0.2.0}" "${PROVISION_REPO}" /opt/sweetty-instance-template
    got="$(git -C /opt/sweetty-instance-template rev-parse HEAD)"
    if [ "${got}" != "${PROVISION_SHA}" ]; then
      echo "provision pin mismatch: got ${got}, want ${PROVISION_SHA}; powering off" >&2
      poweroff -f
      exit 1
    fi
    INSTANCE_ENV=/root/sweetty.instance.env /opt/sweetty-instance-template/provision/provision.sh
    # Install the deploy key only now, after verified-good provisioning created the
    # deploy user. set -e plus the exit 1 above gate this on a clean run.
    install -d -m 0700 -o deploy -g deploy /home/deploy/.ssh
    install -m 0600 -o deploy -g deploy /root/deploy.pub /home/deploy/.ssh/authorized_keys
    rm -f /root/deploy.pub
    # First deploy: bring the pinned release up now, over the same verified deploy
    # path used for every later update (provision installed slotdeploy). The box
    # therefore boots straight into a running, hardened sensor with no manual step.
    # RELEASE_TAG is explicit and pinned, never latest.
    INSTANCE_ENV=/root/sweetty.instance.env /opt/sweetty-instance-template/deploy/deploy.sh "${RELEASE_TAG}"
    '

final_message: "SweeTTY host provisioned and the pinned release deployed. The sensor is live and hostile. Real SSH is on a randomized port: read /root/sweetty-access.txt from the provider serial console for the exact port and tunnel command."
