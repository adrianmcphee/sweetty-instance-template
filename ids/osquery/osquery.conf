{
  "options": {
    "logger_path": "/var/log/osquery",
    "disable_audit": false,
    "audit_allow_config": true,
    "audit_allow_sockets": true,
    "audit_allow_process_events": true,
    "enable_bpf_events": false,
    "events_expiry": 3600,
    "schedule_splay_percent": 10,
    "disable_events": false,
    "enable_file_events": true
  },
  "file_paths": {
    "sweetty_protected": [
      "/opt/sweetty/sweetty-blue",
      "/opt/sweetty/sweetty-green",
      "/opt/sweetty/config.json"
    ],
    "system_persistence": [
      "/etc/ld.so.preload",
      "/etc/cron.d/%%",
      "/etc/systemd/system/%%",
      "/root/.ssh/%%"
    ]
  },
  "exclude_paths": {
    "sweetty_protected": [
      "/opt/sweetty/sweetty.log"
    ]
  },
  "packs": {
    "sweetty-tripwires": "/etc/osquery/packs/sweetty-tripwires.conf"
  }
}
