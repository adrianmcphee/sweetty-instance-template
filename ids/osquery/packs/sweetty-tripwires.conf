{
  "platform": "linux",
  "queries": {
    "honeypot_spawned_a_child": {
      "query": "SELECT pe.pid, pe.path, pe.cmdline, pe.parent, pe.uid, pe.time FROM process_events pe WHERE pe.uid = (SELECT uid FROM users WHERE username = 'sweetty') AND pe.path NOT IN ('/opt/sweetty/sweetty-blue', '/opt/sweetty/sweetty-green');",
      "interval": 30,
      "removed": false,
      "snapshot": false,
      "description": "The sweetty user executed something other than its own slot binary. The honeypot has no code path that spawns a child, so this should never return a row."
    },
    "honeypot_dialed_out": {
      "query": "SELECT se.pid, se.path, se.remote_address, se.remote_port, se.uid, se.time FROM socket_events se WHERE se.action = 'connect' AND se.uid = (SELECT uid FROM users WHERE username = 'sweetty') AND se.remote_address NOT IN ('127.0.0.1', '::1', '');",
      "interval": 30,
      "removed": false,
      "snapshot": false,
      "description": "The sweetty user opened an outbound connection. A honeypot only listens; it never dials out and never fetches an attacker-supplied URL."
    },
    "protected_file_changed": {
      "query": "SELECT target_path, category, action, uid, time FROM file_events WHERE category IN ('sweetty_protected', 'system_persistence') AND action != 'ACCESSED';",
      "interval": 30,
      "removed": false,
      "snapshot": false,
      "description": "A slot binary, the config, or a persistence location was written. On a host whose only job is to be attacked, none of these change outside a deploy."
    }
  }
}
