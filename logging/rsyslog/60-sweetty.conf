# Ship sweetty.log off-host with rsyslog.
#
# Installed to /etc/rsyslog.d/60-sweetty.conf by provision.sh, which replaces
# __LOG_HOST__, __LOG_PORT__, __LOG_TLS_GLOBAL__, and __LOG_TLS_PARAMS__ from the
# instance env (the TLS placeholders are empty for plain tcp and carry the gtls
# driver config for tls, including the pinned collector name so TLS authenticates
# which host receives the log, not merely that its cert is CA-signed).
#
# Why ship at all: a honeypot is a box you are prepared to lose. The intel only
# survives if it has already left the building. sweetty.log is also append-only
# on disk (chattr +a), so the local copy is tamper-resistant and the off-host
# copy is the source of truth.

__LOG_TLS_GLOBAL__
module(load="imfile")

# Read the honeypot's JSON event log as a stream of messages. Each line is one
# self-contained JSON event, so no multiline assembly is needed.
input(type="imfile"
      File="/opt/sweetty/sweetty.log"
      Tag="sweetty"
      Severity="info"
      Facility="local5"
      ruleset="sweetty_forward")

ruleset(name="sweetty_forward") {
  # Forward to the collector over TCP (TLS rides on TCP when configured).
  #
  # Bounded, disk-assisted queue. A collector outage must not grow the queue
  # without limit and fill the box's memory or disk. It buffers in memory up to the
  # high watermark, spills to a capped on-disk spool beyond it (queue.maxDiskSpace),
  # and once that cap is reached applies backpressure instead of losing events: the
  # append-only sweetty.log on disk still holds every line, and imfile resumes from
  # its checkpoint when the collector returns. saveOnShutdown persists the in-memory
  # backlog across a restart.
  action(type="omfwd"
         target="__LOG_HOST__"
         port="__LOG_PORT__"
         protocol="tcp"__LOG_TLS_PARAMS__
         action.resumeRetryCount="-1"
         queue.type="linkedList"
         queue.filename="sweetty_fwd"
         queue.spoolDirectory="/var/spool/rsyslog"
         queue.size="100000"
         queue.highWatermark="50000"
         queue.lowWatermark="20000"
         queue.maxDiskSpace="1g"
         queue.maxFileSize="16m"
         queue.saveOnShutdown="on")
}
