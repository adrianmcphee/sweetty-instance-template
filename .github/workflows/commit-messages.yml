name: Commit Messages

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: Validate commit messages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate range
        run: |
          chmod +x .github/scripts/validate-commit-message.sh
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi
          if ! git rev-parse --quiet --verify "$base" >/dev/null 2>&1; then
            base="$(git rev-list --max-parents=0 "$head" | tail -n1)"
          fi
          fail=0
          for sha in $(git rev-list "$base".."$head"); do
            msg="$(git log -1 --format=%B "$sha")"
            if ! printf '%s\n' "$msg" | .github/scripts/validate-commit-message.sh; then
              echo "Offending commit: $sha"
              fail=1
            fi
          done
          exit "$fail"
