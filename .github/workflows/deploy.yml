name: Deploy

# Manual, pinned deploys only. There is deliberately no push trigger and no
# 'latest': a human chooses the release tag and the host installs exactly that.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "SweeTTY release tag to deploy (for example v0.3.0)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: sweetty-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy ${{ inputs.tag }}
    # Never run from the template repo itself; only from a real instance repo.
    if: github.repository != 'adrianmcphee/sweetty-instance-template'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Reject 'latest'
        run: |
          if [ "${{ inputs.tag }}" = "latest" ]; then
            echo "refusing to deploy 'latest'; pin an explicit tag" >&2
            exit 1
          fi

      - name: Checkout instance repo
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build slotdeploy (pinned)
        run: |
          git clone --depth 1 --branch "${SLOTDEPLOY_REF}" \
            https://github.com/adrianmcphee/slotdeploy .slotdeploy
          cd .slotdeploy
          GOOS=linux GOARCH=amd64 go build -buildvcs=false \
            -o "${GITHUB_WORKSPACE}/slotdeploy" ./cmd/slotdeploy
        env:
          # Pin the deployer. Bump deliberately.
          SLOTDEPLOY_REF: ${{ vars.SLOTDEPLOY_REF || 'main' }}

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keygen -y -f ~/.ssh/id_deploy >/dev/null || { echo "invalid SSH key"; exit 1; }

      - name: Ship slotdeploy to the host
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
          ADMIN_SSH_PORT: ${{ vars.ADMIN_SSH_PORT }}
        run: |
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new \
            -p "${ADMIN_SSH_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            'mkdir -p ~/bin'
          scp -i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new \
            -P "${ADMIN_SSH_PORT}" slotdeploy \
            "${DEPLOY_USER}@${DEPLOY_HOST}:bin/slotdeploy"
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new \
            -p "${ADMIN_SSH_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            'chmod +x ~/bin/slotdeploy'

      - name: Run the deploy
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
          ADMIN_SSH_PORT: ${{ vars.ADMIN_SSH_PORT }}
          # Where the instance repo lives on the host (cloud-init clones it here).
          INSTANCE_DIR: ${{ vars.INSTANCE_DIR || '/opt/sweetty-instance-template' }}
          TAG: ${{ inputs.tag }}
        run: |
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new \
            -p "${ADMIN_SSH_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "SLOTDEPLOY_BIN=\$HOME/bin/slotdeploy ${INSTANCE_DIR}/deploy/deploy.sh ${TAG}"
